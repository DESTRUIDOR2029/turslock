<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="icon" href="../../turslock/srcprojeto/img/icone.png" type="image/x-icon">
    <link rel="stylesheet" href="../../turslock/srcprojeto/css/output.css">
</head>
<body class="bg-gradient-to-br from-turslok4 via-gray-300 to-teal-200">
    <header>
        <div class="flex fixed z-10 bg-turslok1 w-full px-3 md:px-20 py-4">
            <div class="container flex justify-center mx-auto">
                <a href="../../index.html">
                    <img src="../../turslock/srcprojeto/img/logo.png" alt="turslock" class="w-35 md:w-125px">
                </a>
            </div>
        </div>
    </header>
    <main class="grid justify-center">
        <form action="" class="mt-25 md:w-140 w-60">
            <div class="m-4">
                <div class="grid gap-4 justify-center mt-1 border rounded-2xl bg-white">
                    <div class="grid justify-center items-center bg-turslok2 rounded-lg h-10 m-4">
                        <div class="font-bold">REGISTRAR-SE</div>
                    </div>
                    Informações de usuário
                    <div class="grid gap-2">
                        <div class="text-sm">Nome<div><input type="text" placeholder=" Nome Completo" class="px-3 border rounded-sm md:w-100 w-full h-10 focus:ring-1 focus:ring-black hover:ring-1 hover:ring-black" required></div></div>
                        <div class="text-sm">Data de nascimento<div><input type="text" placeholder=" DD/MM/AA" class="px-3 border rounded-sm md:w-100 w-full h-10 focus:ring-1 focus:ring-black hover:ring-1 hover:ring-black" required></div></div>
                        <div class="text-sm">CPF<div><input type="text" placeholder=" _ _ _._ _ _._ _ _-_ _" class="px-3 border rounded-sm md:w-100 w-full h-10 focus:ring-1 focus:ring-black hover:ring-1 hover:ring-black" required></div></div>
                        <div class="flex flex-col mb-4 rounded-xs border">
                            <select>
                                <option>Selecione</option>
                                <option>Usuario</option>
                                <option>Prestador de Serviço</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="grid gap-2 justify-center mt-4 border rounded-2xl bg-white">
                    <div class="mt-4">Informações para Contato</div>
                    <div class="text-sm mt-4">Numero de Telefone<div><input type="text" placeholder=" (NN) _ _ _ _ _-_ _ _ _" class="px-3 border rounded-sm md:w-100 w-full h-10 focus:ring-1 focus:ring-black hover:ring-1 hover:ring-black" required></div></div>
                    <div class="text-sm">Email<div><input type="email" placeholder=" nome@endereço.instituição" class="px-3 border rounded-sm md:w-100 w-full h-10 focus:ring-1 focus:ring-black hover:ring-1 hover:ring-black" required></div></div>
                    <div class="text-sm mb-4">Confirmação de Email<div><input type="email" placeholder=" nome@endereço.instituição" class="px-3 border rounded-sm md:w-100 w-full h-10 focus:ring-1 focus:ring-black hover:ring-1 hover:ring-black" required></div></div>
                </div>
                <div class="grid gap-2 justify-center mt-4 border rounded-2xl bg-white">
                    <div class="mt-4">Informações de Residência</div>
                    <div class="text-sm mt-4">Endereço<div><input type="text" placeholder="EX:Rua..." class="px-3 border rounded-sm md:w-100 w-full h-10 focus:ring-1 focus:ring-black hover:ring-1 hover:ring-black" required></div></div>
                    <div class="text-sm">Bairro<div><input type="text" placeholder="digite" class="px-3 border rounded-sm md:w-100 w-full h-10 focus:ring-1 focus:ring-black hover:ring-1 hover:ring-black" required></div></div>
                    <div class="text-sm mb-4">Numero da Casa/Apartamento<div><input type="text" placeholder="Digite o número" class="px-3 border rounded-sm md:w-100 w-full h-10 focus:ring-1 focus:ring-black hover:ring-1 hover:ring-black" required></div></div>
                </div>
                <div class="border rounded-2xl mt-4 bg-white">
                    <fieldset>
                        <div class="flex flex-col md:m-4 m-3 md:ml-15">
                            <label><input type="checkbox" required> Termos de Uso</label>
                            <label><input type="checkbox" required> Política de Privacidade</label>
                        </div>
                    </fieldset>
                </div>
                <div class="grid justify-center mt-4">
                    <button type="submit" class="border rounded-2xl bg-turslok2 hover:bg-turslok3 font-bold w-32 hover:ring-1 hover:ring-black">CADASTRAR</button>
                </div>
            </div>
        </form>
    </main>
</body>
</html>
