<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="icon" href="../../turslock/srcprojeto/img/icone.png" type="image/x-icon">
    <link rel="stylesheet" href="../../turslock/srcprojeto/css/output.css">
</head>
<body class="bg-gradient-to-br from-turslok4 via-gray-300 to-teal-200">
    <header>
        <div class="fixed top-0 left-0 z-10 w-full bg-turslok1 px-3 py-4 md:px-20">
            <div class="container mx-auto flex justify-center">
                <a href="../../index.html">
                    <img src="../../turslock/srcprojeto/img/logo.png" alt="turslock" class="w-35 md:w-125px">
                </a>
            </div>
        </div>
    </header>
    <main class="grid place-items-center min-h-screen pt-24">
        <form class="w-[90vw] max-w-md bg-white rounded-2xl border shadow-2xl p-6">
            <h1 class="text-center font-bold text-xl mb-6">Log In</h1>
            <div class="mb-4">
                <input type="text" placeholder="Usuário" required class="w-full border rounded-lg px-3 py-2 focus:bg-gray-200 focus:ring-1 focus:ring-black hover:ring-1 hover:ring-black outline-none">
            </div>
            <div class="mb-2">
                <input type="password" placeholder="Digite sua senha" required class="w-full border rounded-lg px-3 py-2 focus:bg-gray-200 focus:ring-1 focus:ring-black hover:ring-1 hover:ring-black outline-none">
            </div>
            <div class="flex justify-end mr-4 mt-1">
                <a href="#" class="text-xs md:text-sm font-semibold hover:text-turslok4 hover:underline">Esqueceu a senha?</a>
            </div>
            <div class="grid justify-center">
                <div class="flex flex-col gap-1 justify-center m-3">
                    <button type="submit" class="border rounded-4xl bg-turslok3 hover:bg-turslok4 md:w-30 w-20 text-sm md:text-lg font-bold py-1 hover:ring-1 hover:ring-black">
                        <a href="../../turslock/perfil/Perfil.html">Entrar</a>
                    </button>
                    <a href="cadastro.html" class="text-xs md:text-sm hover:text-turslok3 font-semibold text-center">Registrar-se</a>
                </div>
            </div>
        </form>
    </main>
</body>
</html>
